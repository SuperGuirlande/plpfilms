{% load tailwind_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation — PLP Films</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    {% tailwind_css %}
</head>
<body class="bg-noir-profond font-texte min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-[420px]">

    <div class="mb-10 text-center">
        <img src="{% static 'images/global/LOGO PLP PNG (1).png' %}"
             alt="PLP Films"
             class="h-12 w-auto invert drop-shadow-[0_0_16px_rgba(255,255,255,0.75)] mx-auto mb-6">
        <p class="font-sous-titre text-xs tracking-[4px] uppercase text-or mb-3">Espace Administrateur</p>
        <h1 class="font-titre text-[3rem] leading-none tracking-[3px] text-white">RÉINITIALISER</h1>
        <div class="w-12 h-[2px] bg-or mt-4 mx-auto"></div>
    </div>

    <div class="bg-noir-doux border border-gris-fonce p-8">
        <p class="font-texte text-sm text-blanc-casse/50 mb-6 leading-relaxed">
            Renseignez votre adresse e-mail. Vous recevrez un lien pour créer un nouveau mot de passe.
        </p>
        <form method="post" class="flex flex-col gap-5">
            {% csrf_token %}
            <div>
                <label for="{{ form.email.id_for_label }}"
                       class="block font-sous-titre text-xs tracking-[2px] uppercase text-blanc-casse/60 mb-2">
                    Adresse e-mail
                </label>
                <input type="email" name="email" id="id_email" required
                       class="w-full bg-gris-fonce border border-[#3a3a3a] focus:border-or text-blanc-casse placeholder-blanc-casse/30 font-texte text-sm px-4 py-3 outline-none transition-colors duration-200"
                       placeholder="exemple@email.com">
            </div>
            <button type="submit"
                    class="w-full py-4 bg-or text-noir-profond font-sous-titre text-sm tracking-[3px] uppercase transition-all duration-300 hover:bg-or-clair hover:shadow-[0_8px_30px_rgba(212,175,55,0.4)]">
                Envoyer le lien
            </button>
        </form>
    </div>

    <p class="mt-6 text-center font-texte text-sm text-blanc-casse/30">
        <a href="{% url 'accounts:login' %}" class="hover:text-or transition-colors duration-200">← Retour à la connexion</a>
    </p>

</div>
</body>
</html>
